<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточная игра Архив</title>
        <style>
        /* Import Google Fonts for a futuristic, geometric look */
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap');

        :root {
            --neon-green: #00ffaa;
            --dark-emerald: #082115;
            --glass-bg: rgba(10, 30, 25, 0.4);
            --glass-border: rgba(0, 255, 170, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #90bbaa;
            --highlight: #00ffee;
            --danger: #ff4757;
            --btn-glass: rgba(0, 255, 170, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Space Grotesk', sans-serif;
            background-color: #040d09;
            color: var(--text-primary);
            overflow: hidden; user-select: none;
        }

        /* Screens */
        #login-screen, #game-screen {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
        }

        /* Cinematic Background */
        #game-screen {
            display: none;
            background: radial-gradient(circle at 50% 30%, #0d3623 0%, #040d09 80%);
            box-shadow: inset 0 0 150px rgba(0,0,0,0.8);
        }

        /* Background grid/holographic lines */
        #game-screen::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(0, 255, 170, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 170, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* Login UI */
        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #040d09;
        }
        .login-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px; border-radius: 16px; text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,255,170,0.05);
            width: 300px;
        }
        .login-box h2 { margin-top: 0; font-weight: 700; letter-spacing: 1px; color: var(--neon-green); }
        .login-box input {
            display: block; width: 100%; margin: 15px 0; padding: 12px; box-sizing: border-box;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: white;
            font-size: 14px; font-family: 'Space Grotesk', sans-serif;
            transition: all 0.3s ease;
        }
        .login-box input:focus { outline: none; border-color: var(--neon-green); box-shadow: 0 0 10px rgba(0,255,170,0.2); }
        .login-box button {
            background: var(--btn-glass); color: var(--neon-green);
            border: 1px solid var(--neon-green); padding: 12px 20px; font-size: 16px; font-weight: 500;
            border-radius: 8px; cursor: pointer; margin-top: 20px; width: 100%;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        .login-box button:hover {
            background: var(--neon-green); color: #000;
            box-shadow: 0 0 20px rgba(0,255,170,0.4);
        }

        /* Game UI */
        #table {
            position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; z-index: 1;
        }

        #center-area {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center;
        }
        #community-cards {
            display: flex; gap: 15px; margin-bottom: 20px; min-height: 120px;
        }

        /* Premium Pot Indicator */
        #pot {
            font-size: 20px; font-weight: 700;
            background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 8px 24px; border-radius: 20px;
            border: 1px solid var(--glass-border);
            color: var(--neon-green); letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #phase-info {
            margin-top: 15px; font-weight: 500; color: var(--text-secondary);
            font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
        }

        #combat-area {
            position: absolute; top: 25%; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px;
        }

        /* Players */
        .player-spot {
            position: absolute;
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 15px; border-radius: 12px;
            text-align: left; width: 160px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }
        #player-top { top: 30px; left: 50%; transform: translateX(-50%); }
        #player-left { top: 50%; left: 30px; transform: translateY(-50%); }
        #player-right { top: 50%; right: 30px; transform: translateY(-50%); }

        .player-name { font-weight: 700; font-size: 16px; color: var(--highlight); margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .player-info { font-size: 12px; margin-top: 4px; color: var(--text-secondary); }
        .active-turn {
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0,255,170,0.2), inset 0 0 10px rgba(0,255,170,0.1);
        }

        /* Own Player Area */
        #bottom-area {
            position: absolute; bottom: 0; width: 100%; height: 220px;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 30px 40px; box-sizing: border-box;
            background: linear-gradient(to top, rgba(4,13,9,0.95), transparent);
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        #own-info {
            font-size: 14px; color: var(--text-secondary); margin-bottom: 15px; letter-spacing: 1px;
        }

        #btn-ready {
            background: rgba(0,255,170,0.1); padding: 12px 20px; color: var(--neon-green); border: 1px solid var(--neon-green);
            border-radius: 8px; cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-weight: 500;
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s;
        }
        #btn-ready:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px rgba(0,255,170,0.4); }

        #own-hand {
            display: flex; justify-content: center; flex-grow: 1; position: relative; gap: -20px;
            perspective: 1000px;
        }

        #own-archive {
            width: 130px; height: 100px;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center; position: relative;
        }

        #controls {
            width: 280px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end;
        }
        #controls button {
            background: var(--glass-bg); color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 8px;
            cursor: pointer; font-weight: 500; flex: 1 1 45%;
            font-family: 'Space Grotesk', sans-serif; backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }
        #controls button:disabled { opacity: 0.3; cursor: not-allowed; border-color: transparent; }
        #controls button:hover:not(:disabled) {
            background: rgba(255,255,255,0.1);
            border-color: var(--highlight);
            box-shadow: 0 0 10px rgba(0,255,238,0.2);
        }

        /* Chat */
        #chat {
            position: absolute; left: 30px; bottom: 240px; width: 280px; height: 180px;
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 12px; display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        #chat-messages { flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
        #chat-input-area { display: flex; border-top: 1px solid rgba(255,255,255,0.05); padding: 5px; }
        #chat-input {
            flex-grow: 1; border: none; background: transparent; color: white; padding: 8px 10px;
            font-family: 'Space Grotesk', sans-serif; font-size: 12px;
        }
        #chat-input:focus { outline: none; }
        #chat-btn {
            background: transparent; border: none; color: var(--neon-green);
            cursor: pointer; padding: 0 15px; font-weight: 700; text-transform: uppercase; font-size: 11px;
        }
        #chat-btn:hover { color: var(--highlight); text-shadow: 0 0 5px rgba(0,255,238,0.5); }

        /* Cards */
        .card {
            width: 80px; height: 115px;
            background: rgba(255,255,255,0.9); border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.5);
            position: relative; display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 700; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer; margin-left: -30px; font-family: 'Arial', sans-serif;
            transform-style: preserve-3d;
        }
        .card:first-child { margin-left: 0; }
        .card.red { color: #ff4757; }
        .card.black { color: #1e272e; }

        .card.back {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: transparent; border: 2px solid rgba(0,255,170,0.3);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 4px 15px rgba(0,0,0,0.5);
        }
        .card.back::after {
            content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(0,255,170,0.2); border-radius: 4px;
        }

        .card:hover { transform: translateY(-15px) rotateX(10deg); z-index: 10; box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
        .card.selected {
            transform: translateY(-25px) scale(1.05);
            border: 2px solid var(--neon-green); z-index: 10;
            box-shadow: 0 10px 25px rgba(0,255,170,0.3);
        }

        .card-corner {
            position: absolute; top: 5px; left: 5px; font-size: 14px; display: flex; flex-direction: column; line-height: 1; letter-spacing: -1px;
        }
        .card-corner-br {
            position: absolute; bottom: 5px; right: 5px; font-size: 14px; display: flex; flex-direction: column; line-height: 1; transform: rotate(180deg); letter-spacing: -1px;
        }

        /* Card Placeholder */
        .card-placeholder {
            width: 80px; height: 115px;
            border: 1px solid rgba(0, 255, 170, 0.2);
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            box-shadow: inset 0 0 15px rgba(0,255,170,0.05);
        }

        /* Overlay */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 13, 9, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #overlay h1 { font-size: 48px; margin: 0; color: var(--neon-green); text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 20px rgba(0,255,170,0.5); }
        #overlay p { font-size: 20px; color: var(--text-secondary); margin-top: 10px; letter-spacing: 1px; }
        #overlay button {
            margin-top: 30px; padding: 15px 30px; font-size: 16px;
            background: var(--btn-glass); border: 1px solid var(--neon-green); color: var(--neon-green);
            border-radius: 8px; cursor: pointer; text-transform: uppercase; font-family: 'Space Grotesk', sans-serif;
            transition: all 0.3s;
        }
        #overlay button:hover {
            background: var(--neon-green); color: #000; box-shadow: 0 0 20px rgba(0,255,170,0.4);
        }

    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>Карточная игра Архив</h2>
        <input type="text" id="playerName" placeholder="Ваше имя" value="Игрок">
        <input type="text" id="roomId" placeholder="ID комнаты" value="room1">
        <button id="btn-join">Подключиться</button>
    </div>
</div>

<div id="game-screen">
    <div id="table">
        <div class="player-spot" id="player-top" style="display: none;"></div>
        <div class="player-spot" id="player-left" style="display: none;"></div>
        <div class="player-spot" id="player-right" style="display: none;"></div>

        <div id="center-area">
            <div id="combat-area"></div>
            <div id="community-cards"></div>
            <div id="pot">Банк: 0</div>
            <div id="phase-info">Фаза: Ожидание</div>
        </div>

        <div id="chat">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Сообщение...">
                <button id="chat-btn">Отправить</button>
            </div>
        </div>

        <div id="bottom-area">
            <div>
                <div id="own-info">Фишки: 0 | Ставка: 0</div>
                <button id="btn-ready">Готов / Добавить бота</button>
            </div>

            <div id="own-hand"></div>

            <div style="display:flex; flex-direction:column; align-items:center;">
                <div style="margin-bottom: 5px; font-size: 14px; color: var(--text-secondary); letter-spacing: 1px;">Архив (<span id="archive-count">0</span>)</div>
                <div id="own-archive"></div>
            </div>

            <div id="controls">
                <button id="btn-check">Чек</button>
                <button id="btn-call">Колл</button>
                <button id="btn-raise">Рейз (10)</button>
                <button id="btn-fold">Пас</button>
                <button id="btn-attack">Атака</button>
                <button id="btn-defend">Защита</button>
                <button id="btn-decline">Пропустить/Принять</button>
            </div>
        </div>
    </div>
</div>

<div id="overlay">
    <h1 id="overlay-title">Шоудаун!</h1>
    <p id="overlay-desc">Победитель: Алекс с Флешем</p>
    <button id="btn-next">Следующий раунд</button>
</div>

<script>
    let ws;
    let myPlayerId = null;
    let currentRoomId = null;
    let currentState = null;
    let selectedCardId = null;

    // Elements
    const loginScreen = document.getElementById('login-screen');
    const gameScreen = document.getElementById('game-screen');
    const btnJoin = document.getElementById('btn-join');
    const playerNameInput = document.getElementById('playerName');
    const roomIdInput = document.getElementById('roomId');
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const chatBtn = document.getElementById('chat-btn');
    const overlay = document.getElementById('overlay');
    const btnReady = document.getElementById('btn-ready');

    btnJoin.addEventListener('click', connect);

    function connect() {
        const name = playerNameInput.value.trim();
        const room = roomIdInput.value.trim();
        if (!name || !room) return;
        initAudio();

        // Automatically determine WebSocket URL based on host
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsHost = window.location.host || 'localhost:8080';
        ws = new WebSocket(`${wsProtocol}//${wsHost}`);

        ws.onopen = () => {
            console.log('Подключено к серверу');
            loginScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            currentRoomId = room;

            ws.send(JSON.stringify({ type: 'join', roomId: room, playerName: name }));
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'state') {
                currentState = data.state;
                if (!myPlayerId) {
                    const me = currentState.players.find(p => p.name === name);
                    if (me) myPlayerId = me.id;
                }
                renderState();
            } else if (data.type === 'chat') {
                addChatMessage(`${data.player}: ${data.message}`);
            } else if (data.type === 'event') {
                addChatMessage(`>> ${data.player} ${data.event === 'сыграл карту' ? 'сыграл карту ' + data.card : data.event}`);
                playSound('card');
            } else if (data.type === 'winner') {
                overlay.style.display = 'flex';
                document.getElementById('overlay-title').innerText = `Побеждает ${data.winner}!`;
                document.getElementById('overlay-desc').innerText = `Комбинация: ${data.combination}`;
                playSound('win');
            } else if (data.type === 'error') {
                console.error(data.message);
                alert(data.message);
            }
        };

        ws.onclose = () => {
            console.log('Отключено. Переподключение через 3с...');
            setTimeout(connect, 3000);
        };
    }

    function sendAction(action, extraParams = {}) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: 'action', roomId: currentRoomId, action, ...extraParams }));
        selectedCardId = null;
        renderState(); // Immediate UI update to clear selection
    }

    chatBtn.addEventListener('click', () => {
        const msg = chatInput.value.trim();
        if (msg && ws) {
            ws.send(JSON.stringify({ type: 'chat', roomId: currentRoomId, message: msg }));
            chatInput.value = '';
        }
    });

    btnReady.addEventListener('click', (e) => {
        if (!currentState) return;
        // If holding shift, add a bot (secret feature)
        if (e.shiftKey) {
            ws.send(JSON.stringify({ type: 'addBot', roomId: currentRoomId }));
        } else {
            ws.send(JSON.stringify({ type: 'ready', roomId: currentRoomId }));
        }
    });

    document.getElementById('btn-next').addEventListener('click', () => {
        overlay.style.display = 'none';
        ws.send(JSON.stringify({ type: 'ready', roomId: currentRoomId }));
    });

    // Audio Context Setup
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'card') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'win') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.setValueAtTime(554, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }
    }

    function addChatMessage(msg) {
        const div = document.createElement('div');
        div.innerText = msg;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function createCardElement(card, isBack = false) {
        const div = document.createElement('div');
        div.className = 'card';
        if (isBack) {
            div.classList.add('back');
            return div;
        }

        const isRed = card.suit === '♥' || card.suit === '♦';
        if (isRed) div.classList.add('red');
        else div.classList.add('black');

        div.innerHTML = `
            <div class="card-corner">${card.rank}<br>${card.suit}</div>
            <div style="font-size:36px;">${card.suit}</div>
            <div class="card-corner-br">${card.rank}<br>${card.suit}</div>
        `;
        div.dataset.id = card.id;

        div.addEventListener('click', () => {
            if (currentState.currentTurn !== myPlayerId) return;
            // Deselect others
            document.querySelectorAll('#own-hand .card').forEach(c => c.classList.remove('selected'));
            selectedCardId = card.id;
            div.classList.add('selected');
        });

        return div;
    }

    function renderState() {
        if (!currentState || !myPlayerId) return;

        const s = currentState;
        document.getElementById('pot').innerText = `Банк: ${s.pot}`;
        const phaseMap = { waiting: 'ОЖИДАНИЕ', betting: 'ТОРГИ', attack: 'АТАКА', defense: 'ЗАЩИТА', showdown: 'ШОУДАУН', finished: 'ЗАВЕРШЕНО' };
        document.getElementById('phase-info').innerText = `Фаза: ${phaseMap[s.phase] || s.phase.toUpperCase()}`;

        // Buttons
        const isMyTurn = s.currentTurn === myPlayerId;
        const ctrls = document.getElementById('controls').children;
        for(let btn of ctrls) btn.disabled = true;

        if (isMyTurn && s.phase === 'betting') {
            document.getElementById('btn-check').disabled = false;
            document.getElementById('btn-call').disabled = false;
            document.getElementById('btn-raise').disabled = false;
            document.getElementById('btn-fold').disabled = false;
        } else if (isMyTurn && s.phase === 'attack') {
            document.getElementById('btn-attack').disabled = false;
            document.getElementById('btn-decline').disabled = false;
        } else if (isMyTurn && s.phase === 'defense') {
            document.getElementById('btn-defend').disabled = false;
            document.getElementById('btn-decline').disabled = false;
        }

        // Action bindings (only bind once, so remove and add if needed, or just define them outside. Defined outside is better).

        // Center Area
        const commContainer = document.getElementById('community-cards');
        commContainer.innerHTML = '';
        for (let i = 0; i < 5; i++) {
            if (i < s.communityCards.length) {
                const card = s.communityCards[i];
                const revealed = s.communityRevealed[i];
                commContainer.appendChild(createCardElement(card, !revealed));
            } else {
                // Placeholder
                const empty = document.createElement('div');
                empty.className = 'card-placeholder';
                commContainer.appendChild(empty);
            }
        }

        // Combat Area
        const combatArea = document.getElementById('combat-area');
        combatArea.innerHTML = '';
        if (s.combat && s.combat.attackCard) {
            combatArea.appendChild(createCardElement(s.combat.attackCard, false));
        }

        // Players
        const me = s.players.find(p => p.id === myPlayerId);
        if (me) {
            document.getElementById('own-info').innerText = `Фишки: ${me.chips} | Ставка: ${me.bet}`;
            const handContainer = document.getElementById('own-hand');
            handContainer.innerHTML = '';

            // If hand is a number (hidden), we shouldn't be here, but just in case
            const myHand = Array.isArray(me.hand) ? me.hand : [];
            myHand.forEach(c => {
                const cardEl = createCardElement(c);
                if (c.id === selectedCardId) cardEl.classList.add('selected');
                handContainer.appendChild(cardEl);
            });

            document.getElementById('archive-count').innerText = Array.isArray(me.archive) ? me.archive.length : me.archive;
            const archiveContainer = document.getElementById('own-archive');
            archiveContainer.innerHTML = '';
            if (Array.isArray(me.archive) && me.archive.length > 0) {
                // Show top card
                archiveContainer.appendChild(createCardElement(me.archive[me.archive.length-1]));
            }
        }

        // Opponents
        const opponents = s.players.filter(p => p.id !== myPlayerId);
        const spots = ['player-top', 'player-left', 'player-right'];
        spots.forEach(id => document.getElementById(id).style.display = 'none');

        opponents.forEach((opp, index) => {
            if (index >= spots.length) return;
            const spot = document.getElementById(spots[index]);
            spot.style.display = 'block';
            if (s.currentTurn === opp.id) spot.classList.add('active-turn');
            else spot.classList.remove('active-turn');

            let archiveLen = Array.isArray(opp.archive) ? opp.archive.length : opp.archive;
            // Escape HTML to prevent XSS
            const safeName = opp.name.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            spot.innerHTML = `
                <div class="player-name">${safeName} ${opp.folded ? '(Сбросил)' : ''}</div>
                <div class="player-info">Фишки: ${opp.chips} | Ставка: ${opp.bet}</div>
                <div class="player-info">Карты: ${opp.hand} | Архив: ${archiveLen}</div>
                <div class="player-info">Защиты: ${opp.defenses}</div>
            `;
        });
    }

    // Bind action buttons
    document.getElementById('btn-check').addEventListener('click', () => sendAction('check'));
    document.getElementById('btn-call').addEventListener('click', () => sendAction('call'));
    document.getElementById('btn-raise').addEventListener('click', () => sendAction('raise', { amount: 10 }));
    document.getElementById('btn-fold').addEventListener('click', () => sendAction('fold'));

    document.getElementById('btn-attack').addEventListener('click', () => {
        if (selectedCardId) sendAction('attack', { cardId: selectedCardId });
        else alert('Сначала выберите карту!');
    });
    document.getElementById('btn-defend').addEventListener('click', () => {
        if (selectedCardId) sendAction('defend', { cardId: selectedCardId });
        else alert('Сначала выберите карту!');
    });
    document.getElementById('btn-decline').addEventListener('click', () => {
        if (currentState.phase === 'attack') sendAction('skip');
        else if (currentState.phase === 'defense') sendAction('decline');
    });

</script>
</body>
</html>
